server:
  port: 8086

spring:
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        - id: userproject
          uri: lb://USERPROJECT
          predicates:
            - Path=/api/users/**

        - id: activityservice
          uri: lb://ACTIVITYSERVICE
          predicates:
            - Path=/api/activities/**

        - id: aiservice
          uri: lb://AISERVICE
          predicates:
            - Path=/api/recommendations/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
